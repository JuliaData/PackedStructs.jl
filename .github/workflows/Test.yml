name: Test

on:
  push:
    branches:
      - main
    tags: ["*"]
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/ReusableTest.yml
    with:
      os: ${{ matrix.os }}
      version: ${{ matrix.version }}
      arch: ${{ matrix.arch }}
      allow_failure: ${{ matrix.allow_failure }}
      run_codecov: ${{ matrix.version == '1.12' && matrix.os == 'ubuntu-latest' }}
    secrets:
      codecov_token: ${{ secrets.CODECOV_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - "lts"
          - "1.12"
        os:
          - ubuntu-latest
        arch:
          - x64
        allow_failure: [false]
        include:
          # Latest Julia pre-release (currently 1.13 rc): uses the JET fork pin
          # from test/Project.toml's `[sources]` (`julia-1.13-compat` branch,
          # the only JET that supports 1.13). Allowed to fail.
          - version: "pre"
            os: ubuntu-latest
            arch: x64
            allow_failure: true
