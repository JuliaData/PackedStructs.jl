name: Reusable test

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string
        default: "1"
      os:
        required: false
        type: string
        default: ubuntu-latest
      arch:
        required: false
        type: string
        default: x64
      allow_failure:
        required: false
        type: boolean
        default: false
      run_codecov:
        required: false
        type: boolean
        default: false
    secrets:
      codecov_token:
        required: true

jobs:
  test:
    name: Julia ${{ inputs.version }} - ${{ inputs.os }} - ${{ inputs.arch }} - ${{ github.event_name }}
    runs-on: ${{ inputs.os }}
    continue-on-error: ${{ inputs.allow_failure }}

    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ inputs.version }}
          arch: ${{ inputs.arch }}
      - name: Use Julia cache
        uses: julia-actions/cache@v3
      # `julia-buildpkg` instantiates the package (and, via `[workspace]`, its test
      # environment). It is skipped on the versions that build in a temp env instead:
      # `lts` (1.10 ignores `[sources]`, so the EmulatedBitIntegers URL pin in the
      # main `Project.toml` can't resolve from the registry) and `pre` (the workspace
      # resolve would pull the test-only registered JET, which caps below 1.13; the
      # fork is injected below).
      - uses: julia-actions/julia-buildpkg@v1
        if: ${{ inputs.version != 'lts' && inputs.version != 'pre' }}
      # On Julia 1.10, `[sources]` is ignored (honoring it is a 1.11+ feature), so
      # dev the deps into a temp env and test by name. EmulatedBitIntegers must be
      # added before developing PackedStructs: developing it triggers a resolve of
      # the `EmulatedBitIntegers = "0.4"` requirement, which the ignored URL pin
      # can't satisfy. JET resolves from the registry (the JET testset in
      # `test/runtests.jl` is gated to Julia >= 1.12, so on lts its version only
      # needs to resolve).
      - name: Run tests (lts path)
        if: ${{ inputs.version == 'lts' }}
        run: |
          julia --color=yes -e '
            using Pkg
            Pkg.activate(; temp=true)
            Pkg.add(PackageSpec(url="https://github.com/PatrickHaecker/EmulatedBitIntegers.jl", rev="main"))
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.test("PackedStructs"; coverage=true,
                     julia_args=["--check-bounds=yes", "--depwarn=yes"])'
      # Julia 1.13 pre-release: registered JET does not yet support 1.13, so dev the
      # deps into a temp env and add the JET fork's `julia-1.13-compat` branch there.
      # Drop this step once a 1.13-compatible JET is released. Runs without coverage
      # or `--check-bounds=yes` so the `performance invariants` testset measures clean
      # codegen: those flags perturb the exact LLVM op counts it asserts (calibrated
      # on 1.11+).
      - name: Run tests (pre path with JET fork)
        if: ${{ inputs.version == 'pre' }}
        run: |
          julia --color=yes -e '
            using Pkg
            Pkg.activate(; temp=true)
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.add(PackageSpec(url="https://github.com/PatrickHaecker/EmulatedBitIntegers.jl", rev="main"))
            Pkg.add(PackageSpec(url="https://github.com/PatrickHaecker/JET.jl", rev="julia-1.13-compat"))
            Pkg.test("PackedStructs"; julia_args=["--depwarn=yes"])'
      # Standard path for the remaining versions: the package was instantiated by
      # `julia-buildpkg` above (on 1.11+ `[sources]` is honored, so the
      # EmulatedBitIntegers URL pin resolves), so run its tests directly. Gated to
      # mirror that step.
      - uses: julia-actions/julia-runtest@v1
        if: ${{ inputs.version != 'lts' && inputs.version != 'pre' }}
      - uses: julia-actions/julia-processcoverage@v1
        if: ${{ inputs.run_codecov }}
      - uses: codecov/codecov-action@v7
        if: ${{ inputs.run_codecov }}
        with:
          files: lcov.info
          token: ${{ secrets.codecov_token }}
